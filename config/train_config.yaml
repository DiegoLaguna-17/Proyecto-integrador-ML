# Configuración de Entrenamiento - PlantVillage MLOps

mlflow:
  experiment_name: 'PlantVillage_Disease_Classification'
  ml_run_name: 'random_forest_v1'
  knn_run_name: 'knn_v1'
  svc_run_name: 'svc_v1'
  clustering_run_name: 'clustering_kmeans_v1'
  cnn_run_name: 'cnn_v2'
  tracking_uri: 'mlruns'

random_forest:
  n_estimators: 100
  random_state: 42
  n_jobs: -1

knn:
  n_neighbors: 5

svc:
  kernel: 'rbf'
  probability: true
  random_state: 42

clustering:
  n_clusters: 10
  random_state: 42

cnn:
  img_size: [224, 224]
  batch_size: 32
  epochs: 15 # Son varias épocas, requiere mucho poder computacional
  fine_tune_epochs: 5
  learning_rate: 0.0005
  fine_tune_lr: 0.00005
  validation_split: 0.2
  seed: 42
  l2_reg: 0.0001
  dropout_rate: 0.4
  patience: 5 # Paciencia de EarlyStopping
